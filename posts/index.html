<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monkeytype Goals Posts</title>
  <link rel="icon" type="image/png" href="/images/mtg.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #313338; font-family: 'Roboto Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 60px 20px 100px; }
    header { text-align: center; margin-bottom: 48px; }
    header .logo { height: 70px; width: auto; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto; }
    header p { color: rgba(255,255,255,0.5); font-size: 0.78rem; font-weight: 300; }
    .container { width: 100%; max-width: 680px; display: flex; flex-direction: column; }

    /* Compose */
    #compose { background: #2b2d31; border-radius: 8px 8px 0 0; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 2px; }
    #compose-top { display: flex; align-items: flex-start; gap: 12px; }
    #compose-name { color: #e2b714; font-size: 0.78rem; font-weight: 500; white-space: nowrap; padding-top: 5px; flex-shrink: 0; cursor: pointer; user-select: none; }
    #compose-name:hover { text-decoration: underline; }
    #compose textarea { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-family: 'Roboto Mono', monospace; font-size: 0.88rem; resize: none; min-height: 42px; line-height: 1.6; padding-top: 3px; }
    #compose textarea::placeholder { color: rgba(255,255,255,0.25); }
    #compose-footer { display: flex; align-items: center; justify-content: flex-end; gap: 10px; }
    #compose-counter { color: rgba(255,255,255,0.35); font-size: 0.72rem; }
    #post-btn { background: #e2b714; border: none; border-radius: 6px; color: #1a1a1a; cursor: pointer; font-family: 'Roboto Mono', monospace; font-size: 0.82rem; font-weight: 600; padding: 7px 16px; transition: opacity 0.2s; }
    #post-btn:hover { opacity: 0.85; }
    #post-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Feed */
    #posts-feed { display: flex; flex-direction: column; }
    .post-card { background: #2b2d31; padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,0.06); animation: fadeIn 0.2s ease; }
    .post-name { color: #e2b714; font-size: 0.78rem; font-weight: 500; margin-bottom: 5px; }
    .post-content { color: #fff; font-size: 0.88rem; line-height: 1.65; word-break: break-word; white-space: pre-wrap; }
    .post-time { color: rgba(255,255,255,0.25); font-size: 0.7rem; margin-top: 7px; }

    /* Reply button row */
    .post-actions { display: flex; align-items: center; gap: 14px; margin-top: 8px; }
    .reply-btn { background: none; border: none; color: rgba(255,255,255,0.35); font-family: 'Roboto Mono', monospace; font-size: 0.72rem; cursor: pointer; padding: 0; transition: color 0.15s; }
    .reply-btn:hover { color: #e2b714; }

    /* Replies section */
    .replies-section { margin-top: 6px; }
    .reply-thread { border-left: 2px solid rgba(255,255,255,0.07); margin-left: 12px; padding-left: 12px; display: flex; flex-direction: column; gap: 0; }
    .reply-card { padding: 10px 0 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); animation: fadeIn 0.15s ease; }
    .reply-card:last-child { border-bottom: none; }
    .reply-name { color: #e2b714; font-size: 0.73rem; font-weight: 500; margin-bottom: 3px; }
    .reply-content { color: rgba(255,255,255,0.88); font-size: 0.82rem; line-height: 1.6; word-break: break-word; white-space: pre-wrap; }
    .reply-meta { display: flex; align-items: center; gap: 12px; margin-top: 5px; }
    .reply-time { color: rgba(255,255,255,0.22); font-size: 0.67rem; }
    .reply-reply-btn { background: none; border: none; color: rgba(255,255,255,0.3); font-family: 'Roboto Mono', monospace; font-size: 0.67rem; cursor: pointer; padding: 0; transition: color 0.15s; }
    .reply-reply-btn:hover { color: #e2b714; }

    /* Load more replies */
    .load-more-replies { background: none; border: none; color: rgba(255,255,255,0.3); font-family: 'Roboto Mono', monospace; font-size: 0.72rem; cursor: pointer; padding: 6px 0 2px 0; transition: color 0.15s; display: block; }
    .load-more-replies:hover { color: #e2b714; }

    /* Inline reply compose */
    .reply-compose { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; padding: 10px 12px; background: rgba(255,255,255,0.03); border-radius: 6px; border: 1px solid rgba(255,255,255,0.06); }
    .reply-compose-top { display: flex; align-items: flex-start; gap: 8px; }
    .reply-compose-name { color: #e2b714; font-size: 0.72rem; font-weight: 500; white-space: nowrap; padding-top: 4px; flex-shrink: 0; }
    .reply-compose textarea { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-family: 'Roboto Mono', monospace; font-size: 0.82rem; resize: none; min-height: 32px; line-height: 1.6; }
    .reply-compose textarea::placeholder { color: rgba(255,255,255,0.2); }
    .reply-compose-footer { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
    .reply-compose-counter { color: rgba(255,255,255,0.3); font-size: 0.68rem; }
    .reply-submit-btn { background: #e2b714; border: none; border-radius: 5px; color: #1a1a1a; cursor: pointer; font-family: 'Roboto Mono', monospace; font-size: 0.75rem; font-weight: 600; padding: 5px 12px; transition: opacity 0.2s; }
    .reply-submit-btn:hover { opacity: 0.85; }
    .reply-submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .reply-cancel-btn { background: none; border: none; color: rgba(255,255,255,0.3); font-family: 'Roboto Mono', monospace; font-size: 0.72rem; cursor: pointer; padding: 0; }
    .reply-cancel-btn:hover { color: rgba(255,255,255,0.6); }

    /* Nested reply compose indented */
    .nested-reply-compose { margin-top: 6px; margin-left: 0; }

    #load-sentinel { height: 40px; flex-shrink: 0; }
    .status-line { text-align: center; color: rgba(255,255,255,0.25); font-size: 0.78rem; padding: 22px 0; background: #2b2d31; border-radius: 0 0 8px 8px; }

    /* Name modal */
    #name-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 100; }
    #name-modal { background: #2b2d31; border-radius: 10px; padding: 28px 24px; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 14px; }
    #name-modal h2 { color: #fff; font-size: 0.95rem; font-weight: 500; }
    #name-modal p { color: rgba(255,255,255,0.45); font-size: 0.78rem; line-height: 1.6; }
    #name-modal p.warn { color: #e2b714; }
    #name-input { background: #1e1f22; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: #fff; font-family: 'Roboto Mono', monospace; font-size: 0.88rem; padding: 10px 13px; outline: none; }
    #set-name-btn { background: #e2b714; border: none; border-radius: 6px; color: #1a1a1a; cursor: pointer; font-family: 'Roboto Mono', monospace; font-size: 0.82rem; font-weight: 600; padding: 8px 18px; }
    #set-name-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #cancel-name-btn { background: none; border: none; color: rgba(255,255,255,0.3); font-family: 'Roboto Mono', monospace; font-size: 0.78rem; cursor: pointer; padding: 0; }
    #cancel-name-btn:hover { color: rgba(255,255,255,0.6); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<header>
  <img src="/images/mtgoals.png" alt="Monkeytype Goals" class="logo" />
  <p>Not promoted or endorsed by Miodec.</p>
</header>

<div class="container">
  <div id="compose">
    <div id="compose-top">
      <span id="compose-name">set name…</span>
      <textarea id="compose-ta" placeholder="What's your goal?" maxlength="280" rows="1"></textarea>
    </div>
    <div id="compose-footer">
      <span id="compose-counter">0 / 280</span>
      <button id="post-btn" disabled>Post</button>
    </div>
  </div>

  <div id="posts-feed"></div>
  <div id="load-sentinel"></div>
</div>

<div id="name-modal-overlay" style="display:none;">
  <div id="name-modal">
    <h2>Display name</h2>
    <p id="name-modal-desc">Choose your display name. You can change it once every 7 days.</p>
    <input id="name-input" type="text" maxlength="32" placeholder="your name..." autocomplete="off" />
    <div style="display:flex;gap:10px;align-items:center;">
      <button id="set-name-btn">Set name</button>
      <button id="cancel-name-btn">cancel</button>
    </div>
  </div>
</div>

<script>
  const sbUrl = "sburl";
  const sbKey = "sbkey";

  const NAME_KEY = 'mtg_display_name';
  const NAME_SET_AT_KEY = 'mtg_name_set_at';
  const PAGE_SIZE = 20;
  const REPLY_PREVIEW = 5;
  const CHANGE_INTERVAL_MS = 7 * 24 * 60 * 60 * 1000;

  let myName = localStorage.getItem(NAME_KEY) || '';
  let page = 0;
  let loading = false;
  let exhausted = false;
  let prepended = 0;

  const composeName = document.getElementById('compose-name');
  const composeTa = document.getElementById('compose-ta');
  const composeCounter = document.getElementById('compose-counter');
  const postBtn = document.getElementById('post-btn');
  const feed = document.getElementById('posts-feed');
  const sentinel = document.getElementById('load-sentinel');
  const nameOverlay = document.getElementById('name-modal-overlay');
  const nameInput = document.getElementById('name-input');
  const setNameBtn = document.getElementById('set-name-btn');
  const cancelNameBtn = document.getElementById('cancel-name-btn');
  const nameModalDesc = document.getElementById('name-modal-desc');

  function sbHeaders() {
    return {
      'apikey': sbKey,
      'Authorization': 'Bearer ' + sbKey,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    };
  }

  function canChangeName() {
    const setAt = localStorage.getItem(NAME_SET_AT_KEY);
    if (!setAt) return true;
    return (Date.now() - parseInt(setAt, 10)) >= CHANGE_INTERVAL_MS;
  }

  function daysUntilChange() {
    const setAt = localStorage.getItem(NAME_SET_AT_KEY);
    if (!setAt) return 0;
    const ms = CHANGE_INTERVAL_MS - (Date.now() - parseInt(setAt, 10));
    return Math.max(0, Math.ceil(ms / (24 * 60 * 60 * 1000)));
  }

  function openNameModal() {
    if (myName && !canChangeName()) {
      nameModalDesc.textContent = `You can change your name in ${daysUntilChange()} day(s).`;
      nameModalDesc.className = 'warn';
      nameInput.style.display = 'none';
      setNameBtn.style.display = 'none';
    } else {
      nameModalDesc.textContent = 'Choose your display name. You can change it once every 7 days.';
      nameModalDesc.className = '';
      nameInput.style.display = '';
      setNameBtn.style.display = '';
      nameInput.value = myName || '';
    }
    nameOverlay.style.display = 'flex';
  }

  composeName.onclick = openNameModal;
  cancelNameBtn.onclick = () => { nameOverlay.style.display = 'none'; };
  nameOverlay.onclick = (e) => { if (e.target === nameOverlay) nameOverlay.style.display = 'none'; };

  setNameBtn.onclick = () => {
    const v = nameInput.value.trim();
    if (!v) return;
    myName = v;
    localStorage.setItem(NAME_KEY, v);
    localStorage.setItem(NAME_SET_AT_KEY, Date.now().toString());
    nameOverlay.style.display = 'none';
    updateComposeName();
  };

  function updateComposeName() {
    composeName.textContent = myName || 'set name…';
  }

  composeTa.oninput = () => {
    composeTa.style.height = 'auto';
    composeTa.style.height = composeTa.scrollHeight + 'px';
    const len = composeTa.value.length;
    composeCounter.textContent = `${len} / 280`;
    postBtn.disabled = len === 0 || len > 280 || !myName;
  };

  postBtn.onclick = async () => {
    const text = composeTa.value.trim();
    if (!text || !myName) return;
    postBtn.disabled = true;
    try {
      const newPost = await insertPost(myName, text, null);
      composeTa.value = '';
      composeTa.style.height = 'auto';
      composeCounter.textContent = '0 / 280';
      if (newPost) prependPost(newPost);
    } catch(e) { alert('Check connection.'); postBtn.disabled = false; }
  };

  // ── API ──────────────────────────────────────────────────────────────────

  async function fetchPosts(offset) {
    const url = `${sbUrl}/rest/v1/posts?select=id,display_name,content,created_at,parent_id&order=created_at.desc&offset=${offset}&limit=${PAGE_SIZE}`;
    const res = await fetch(url, { headers: sbHeaders() });
    return res.json();
  }

  async function fetchReplies(postId, limit, offset) {
    // fetch replies whose parent_id = postId, ordered oldest first so thread reads naturally
    const url = `${sbUrl}/rest/v1/posts?select=id,display_name,content,created_at,parent_id&parent_id=eq.${postId}&order=created_at.asc&limit=${limit}&offset=${offset}`;
    const res = await fetch(url, { headers: sbHeaders() });
    return res.json();
  }

  async function countReplies(postId) {
    const url = `${sbUrl}/rest/v1/posts?parent_id=eq.${postId}&select=id`;
    const res = await fetch(url, { headers: { ...sbHeaders(), 'Prefer': 'count=exact', 'Range-Unit': 'items', 'Range': '0-0' } });
    const count = res.headers.get('Content-Range');
    if (count) {
      const total = count.split('/')[1];
      return total === '*' ? 0 : parseInt(total, 10);
    }
    return 0;
  }

  async function insertPost(displayName, content, parentId) {
    const body = { display_name: displayName, content };
    if (parentId) body.parent_id = parentId;
    const res = await fetch(`${sbUrl}/rest/v1/posts`, {
      method: 'POST',
      headers: { ...sbHeaders(), 'Prefer': 'return=representation' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    return Array.isArray(data) ? data[0] : data;
  }

  // ── Rendering ─────────────────────────────────────────────────────────────

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function timeStr(iso) {
    return new Date(iso).toLocaleString();
  }

  function createReplyComposeEl(placeholder, onSubmit, onCancel) {
    const wrap = document.createElement('div');
    wrap.className = 'reply-compose';

    const top = document.createElement('div');
    top.className = 'reply-compose-top';

    const nameEl = document.createElement('span');
    nameEl.className = 'reply-compose-name';
    nameEl.textContent = myName || 'set name…';
    if (!myName) nameEl.onclick = openNameModal;

    const ta = document.createElement('textarea');
    ta.placeholder = placeholder;
    ta.maxLength = 280;
    ta.rows = 1;

    top.appendChild(nameEl);
    top.appendChild(ta);

    const footer = document.createElement('div');
    footer.className = 'reply-compose-footer';

    const counter = document.createElement('span');
    counter.className = 'reply-compose-counter';
    counter.textContent = '0 / 280';

    const cancelBtn = document.createElement('button');
    cancelBtn.className = 'reply-cancel-btn';
    cancelBtn.textContent = 'cancel';
    cancelBtn.onclick = onCancel;

    const submitBtn = document.createElement('button');
    submitBtn.className = 'reply-submit-btn';
    submitBtn.textContent = 'Reply';
    submitBtn.disabled = true;

    footer.appendChild(counter);
    footer.appendChild(cancelBtn);
    footer.appendChild(submitBtn);

    wrap.appendChild(top);
    wrap.appendChild(footer);

    ta.oninput = () => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
      const len = ta.value.length;
      counter.textContent = `${len} / 280`;
      submitBtn.disabled = len === 0 || len > 280 || !myName;
    };

    submitBtn.onclick = async () => {
      const text = ta.value.trim();
      if (!text || !myName) return;
      submitBtn.disabled = true;
      try {
        await onSubmit(text);
      } catch(e) {
        alert('Check connection.');
        submitBtn.disabled = false;
      }
    };

    return wrap;
  }

  // Build a single reply card (can be nested)
  function createReplyCard(reply, depth) {
    const card = document.createElement('div');
    card.className = 'reply-card';
    card.dataset.id = reply.id;

    const nameEl = document.createElement('div');
    nameEl.className = 'reply-name';
    nameEl.textContent = escHtml(reply.display_name);

    const contentEl = document.createElement('div');
    contentEl.className = 'reply-content';
    contentEl.textContent = reply.content;

    const meta = document.createElement('div');
    meta.className = 'reply-meta';

    const timeEl = document.createElement('span');
    timeEl.className = 'reply-time';
    timeEl.textContent = timeStr(reply.created_at);

    const replyBtn = document.createElement('button');
    replyBtn.className = 'reply-reply-btn';
    replyBtn.textContent = 'reply';

    meta.appendChild(timeEl);
    meta.appendChild(replyBtn);

    card.appendChild(nameEl);
    card.appendChild(contentEl);
    card.appendChild(meta);

    // Container for nested replies + compose
    const nestedSection = document.createElement('div');
    nestedSection.className = 'replies-section';
    card.appendChild(nestedSection);

    let composeVisible = false;

    replyBtn.onclick = () => {
      if (!myName) { openNameModal(); return; }
      if (composeVisible) {
        nestedSection.querySelector('.reply-compose')?.remove();
        composeVisible = false;
        return;
      }
      composeVisible = true;
      // load nested replies first if not loaded
      loadNestedReplies(reply.id, nestedSection, depth + 1);

      const compose = createReplyComposeEl(
        `reply to ${reply.display_name}…`,
        async (text) => {
          const newReply = await insertPost(myName, text, reply.id);
          compose.remove();
          composeVisible = false;
          if (newReply) {
            // prepend into nestedSection thread
            let thread = nestedSection.querySelector('.reply-thread');
            if (!thread) {
              thread = document.createElement('div');
              thread.className = 'reply-thread';
              nestedSection.prepend(thread);
            }
            thread.appendChild(createReplyCard(newReply, depth + 1));
          }
        },
        () => { compose.remove(); composeVisible = false; }
      );
      nestedSection.appendChild(compose);
    };

    return card;
  }

  let nestedLoadingSet = new Set();

  async function loadNestedReplies(parentId, container, depth) {
    if (nestedLoadingSet.has(parentId)) return;
    if (container.querySelector('.reply-thread')) return; // already loaded
    nestedLoadingSet.add(parentId);

    try {
      const replies = await fetchReplies(parentId, 999, 0); // load all nested
      if (!replies || replies.length === 0) return;
      const thread = document.createElement('div');
      thread.className = 'reply-thread';
      replies.forEach(r => thread.appendChild(createReplyCard(r, depth)));
      container.prepend(thread);
    } catch(e) {}
    nestedLoadingSet.delete(parentId);
  }

  // Build replies section for a top-level post
  async function buildRepliesSection(postId, container) {
    container.innerHTML = '';

    let allReplies = null; // null = not fully loaded
    let shown = 0;

    async function renderReplies(replies, showAll) {
      container.innerHTML = '';
      const toShow = showAll ? replies : replies.slice(0, REPLY_PREVIEW);
      shown = toShow.length;

      if (toShow.length === 0) return;

      const thread = document.createElement('div');
      thread.className = 'reply-thread';
      toShow.forEach(r => thread.appendChild(createReplyCard(r, 1)));
      container.appendChild(thread);

      if (!showAll && replies.length > REPLY_PREVIEW) {
        const more = replies.length - REPLY_PREVIEW;
        const loadMoreBtn = document.createElement('button');
        loadMoreBtn.className = 'load-more-replies';
        loadMoreBtn.textContent = `load more? (${more} more)`;
        loadMoreBtn.onclick = async () => {
          // load every reply
          const all = await fetchReplies(postId, 999, 0);
          await renderReplies(all, true);
          allReplies = all;
        };
        container.appendChild(loadMoreBtn);
      }
    }

    // Load first batch
    const initial = await fetchReplies(postId, REPLY_PREVIEW + 1, 0);
    if (!initial || initial.length === 0) return;

    if (initial.length <= REPLY_PREVIEW) {
      await renderReplies(initial, true);
      allReplies = initial;
    } else {
      // there are more than preview count
      const preview = initial.slice(0, REPLY_PREVIEW);
      await renderReplies(preview, false);
    }
  }

  // Create top-level post card
  function createCard(post) {
    const card = document.createElement('div');
    card.className = 'post-card';
    card.dataset.id = post.id;

    const nameEl = document.createElement('div');
    nameEl.className = 'post-name';
    nameEl.textContent = post.display_name;

    const contentEl = document.createElement('div');
    contentEl.className = 'post-content';
    contentEl.textContent = post.content;

    const timeEl = document.createElement('div');
    timeEl.className = 'post-time';
    timeEl.textContent = timeStr(post.created_at);

    const actions = document.createElement('div');
    actions.className = 'post-actions';

    const replyBtn = document.createElement('button');
    replyBtn.className = 'reply-btn';
    replyBtn.textContent = 'reply';

    actions.appendChild(replyBtn);

    const repliesSection = document.createElement('div');
    repliesSection.className = 'replies-section';

    let repliesLoaded = false;
    let composeVisible = false;

    // Load replies lazily when reply is clicked or on init for posts with replies
    async function ensureRepliesLoaded() {
      if (!repliesLoaded) {
        repliesLoaded = true;
        await buildRepliesSection(post.id, repliesSection);
      }
    }

    replyBtn.onclick = async () => {
      if (!myName) { openNameModal(); return; }
      await ensureRepliesLoaded();

      if (composeVisible) {
        card.querySelector('.reply-compose')?.remove();
        composeVisible = false;
        return;
      }
      composeVisible = true;

      const compose = createReplyComposeEl(
        'Write a reply…',
        async (text) => {
          const newReply = await insertPost(myName, text, post.id);
          compose.remove();
          composeVisible = false;
          if (newReply) {
            // ensure thread exists in repliesSection
            let thread = repliesSection.querySelector('.reply-thread');
            if (!thread) {
              thread = document.createElement('div');
              thread.className = 'reply-thread';
              repliesSection.prepend(thread);
            }
            thread.appendChild(createReplyCard(newReply, 1));
          }
        },
        () => { compose.remove(); composeVisible = false; }
      );

      // insert compose after actions
      card.insertBefore(compose, repliesSection);
    };

    card.appendChild(nameEl);
    card.appendChild(contentEl);
    card.appendChild(timeEl);
    card.appendChild(actions);
    card.appendChild(repliesSection);

    // Auto-load replies if post has them (check lazily via intersection)
    const replyObserver = new IntersectionObserver(async (entries) => {
      if (entries[0].isIntersecting) {
        replyObserver.disconnect();
        // Peek if there are any replies
        const peek = await fetchReplies(post.id, 1, 0);
        if (peek && peek.length > 0) {
          await ensureRepliesLoaded();
        }
      }
    }, { rootMargin: '200px' });
    replyObserver.observe(card);

    return card;
  }

  function prependPost(post) {
    feed.insertBefore(createCard(post), feed.firstChild);
    prepended++;
  }

  async function loadMore() {
    if (loading || exhausted) return;
    loading = true;
    try {
      // Only fetch top-level posts (parent_id is null)
      const url = `${sbUrl}/rest/v1/posts?select=id,display_name,content,created_at,parent_id&parent_id=is.null&order=created_at.desc&offset=${page * PAGE_SIZE + prepended}&limit=${PAGE_SIZE}`;
      const res = await fetch(url, { headers: sbHeaders() });
      const posts = await res.json();
      posts.forEach(p => feed.appendChild(createCard(p)));
      if (posts.length < PAGE_SIZE) exhausted = true;
      page++;
    } catch(e) {}
    loading = false;
  }

  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadMore();
  }, { rootMargin: '300px' });
  observer.observe(sentinel);

  updateComposeName();
  loadMore();
</script>
</body>
</html>
