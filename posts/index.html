<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mtgoals // feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #323437;
            --main-color: #e2b714;
            --caret-color: #e2b714;
            --sub-color: #646669;
            --sub-alt-color: #2c2e31;
            --text-color: #d1d0c5;
            --error-color: #ca4754;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #container {
            width: 100%;
            max-width: 600px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            color: var(--sub-color);
        }

        .header span { color: var(--main-color); }

        /* Compose Area */
        #compose {
            background: var(--sub-alt-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        #compose-name {
            color: var(--main-color);
            font-size: 0.8rem;
            margin-bottom: 10px;
            cursor: pointer;
            display: inline-block;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: 'Roboto Mono', monospace;
            font-size: 1rem;
            resize: none;
            outline: none;
            height: 60px;
        }

        .compose-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 10px;
        }

        button#post-btn {
            background: transparent;
            border: 1px solid var(--sub-color);
            color: var(--sub-color);
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Roboto Mono';
            transition: 0.2s;
        }

        button#post-btn:hover:not(:disabled) {
            border-color: var(--main-color);
            color: var(--main-color);
        }

        /* Posts */
        .post-card {
            border-bottom: 1px solid var(--sub-alt-color);
            padding: 15px 0;
            animation: fadeIn 0.3s ease;
        }

        .post-name { color: var(--main-color); font-size: 0.9rem; margin-bottom: 5px; }
        .post-content { line-height: 1.5; font-size: 1rem; }
        .post-time { color: var(--sub-color); font-size: 0.7rem; margin-top: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Overlay for Name */
        #name-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }
        .name-box { background: var(--bg-color); padding: 30px; border-radius: 8px; text-align: center; }
        .name-box input { 
            background: var(--sub-alt-color); border: 1px solid var(--sub-color);
            color: var(--text-color); padding: 10px; outline: none; font-family: 'Roboto Mono';
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="header">
            <div>mtgoals // <span>feed</span></div>
            <a href="/" style="color: inherit; text-decoration: none; font-size: 0.8rem;">back to goals</a>
        </div>

        <div id="compose">
            <div id="compose-name" onclick="promptNameChange()">loading...</div>
            <textarea id="compose-ta" placeholder="What's your goal?"></textarea>
            <div class="compose-footer">
                <button id="post-btn">post</button>
            </div>
        </div>

        <div id="feed"></div>
    </div>

    <div id="name-overlay">
        <div class="name-box">
            <p>Enter a display name</p>
            <input type="text" id="name-input" maxlength="20">
            <button id="save-name-btn" style="display:block; margin: 10px auto; background: var(--main-color); border:none; padding: 5px 15px; border-radius:4px; cursor:pointer;">Save</button>
        </div>
    </div>

    <script>
        const sbUrl = "sburl"; // Vercel will replace this
        const sbKey = "sbkey"; // Vercel will replace this

        const NAME_KEY = 'mtg_display_name';
        let myName = localStorage.getItem(NAME_KEY) || '';
        let replyingTo = null;

        const composeName = document.getElementById('compose-name');
        const composeTa = document.getElementById('compose-ta');
        const postBtn = document.getElementById('post-btn');
        const feed = document.getElementById('feed');
        const nameOverlay = document.getElementById('name-overlay');
        const nameInput = document.getElementById('name-input');
        const saveNameBtn = document.getElementById('save-name-btn');

        function sbHeaders() {
            return {
                "apikey": sbKey,
                "Authorization": `Bearer ${sbKey}`,
                "Content-Type": "application/json",
                "Prefer": "return=representation"
            };
        }

        // Initialize Name
        if (!myName) {
            nameOverlay.style.display = 'flex';
        } else {
            composeName.textContent = myName;
        }

        saveNameBtn.onclick = () => {
            const val = nameInput.value.trim();
            if (val) {
                localStorage.setItem(NAME_KEY, val);
                myName = val;
                composeName.textContent = myName;
                nameOverlay.style.display = 'none';
            }
        };

        function promptNameChange() {
            if (replyingTo) {
                replyingTo = null;
                composeTa.placeholder = "What's your goal?";
                composeName.textContent = myName;
                return;
            }
            nameOverlay.style.display = 'flex';
        }

        function setReply(id, name) {
            replyingTo = id;
            composeTa.placeholder = `Replying to ${name}...`;
            composeName.textContent = "cancel reply";
            composeTa.focus();
        }

        postBtn.onclick = async () => {
            const text = composeTa.value.trim();
            if (!text || !myName) return;
            postBtn.disabled = true;
            try {
                await fetch(`${sbUrl}/rest/v1/posts`, {
                    method: 'POST',
                    headers: sbHeaders(),
                    body: JSON.stringify({ 
                        display_name: myName, 
                        content: text,
                        parent_id: replyingTo 
                    })
                });
                location.reload();
            } catch(e) { 
                alert('Check connection.'); 
                postBtn.disabled = false; 
            }
        };

        async function fetchPosts() {
            try {
                const res = await fetch(`${sbUrl}/rest/v1/posts?select=*&order=created_at.desc`, {
                    headers: sbHeaders()
                });
                const posts = await res.json();
                feed.innerHTML = '';
                posts.forEach(post => {
                    feed.appendChild(createCard(post));
                });
            } catch(e) { console.error(e); }
        }

        function createCard(post) {
            const card = document.createElement('div');
            card.className = 'post-card';
            if (post.parent_id) {
                card.style.marginLeft = '28px';
                card.style.borderLeft = '2px solid rgba(226, 183, 20, 0.2)';
                card.style.paddingLeft = '15px';
            }

            card.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <div>
                        <div class="post-name">
                            ${post.display_name} 
                            ${post.parent_id ? '<span style="color:rgba(255,255,255,0.2); font-size:0.65rem; margin-left:5px;">replied</span>' : ''}
                        </div>
                        <div class="post-content">${post.content}</div>
                    </div>
                    <button onclick="setReply(${post.id}, '${post.display_name}')" style="background:none; border:none; cursor:pointer; width:18px; padding:0; margin-top:4px; opacity:0.3; transition:0.2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.3">
                        <svg fill="#e2b714" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20,3H4A2,2,0,0,0,2,5V22l5.36-5H20a2,2,0,0,0,2-2V5A2,2,0,0,0,20,3Z"></path></svg>
                    </button>
                </div>
                <div class="post-time">${new Date(post.created_at).toLocaleString()}</div>
            `;
            return card;
        }

        fetchPosts();
    </script>
</body>
</html>
