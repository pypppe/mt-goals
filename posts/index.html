<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mtgoals // feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #323437;
            color: #d1d0c5;
            font-family: 'Roboto Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        #container { width: 100%; max-width: 600px; }

        /* --- THE ORIGINAL MINIMALIST COMPOSE --- */
        #compose { margin-bottom: 60px; }
        #compose-name { color: #e2b714; cursor: pointer; font-size: 0.9rem; margin-bottom: 8px; display: inline-block; }
        textarea {
            width: 100%; background: transparent; border: none; color: #d1d0c5;
            font-family: 'Roboto Mono'; font-size: 1.5rem; outline: none; resize: none; height: 60px;
        }
        #post-btn {
            background: transparent; border: none; color: #646669; cursor: pointer;
            font-family: 'Roboto Mono'; font-size: 0.8rem; padding: 0; transition: 0.2s;
        }
        #post-btn:hover { color: #d1d0c5; }

        /* --- THE ORIGINAL POST DESIGN --- */
        .post-card { margin-bottom: 40px; }
        .post-header { display: flex; justify-content: space-between; align-items: center; }
        .post-name { color: #e2b714; font-size: 0.9rem; }
        .post-content { margin: 10px 0; font-size: 1.2rem; line-height: 1.4; }
        .post-time { color: #646669; font-size: 0.7rem; }

        .reply-icon { width: 16px; height: 16px; fill: #646669; cursor: pointer; transition: 0.2s; }
        .reply-icon:hover { fill: #e2b714; }

        /* --- NESTED REPLIES --- */
        .replies-container {
            margin-left: 20px; margin-top: 15px;
            border-left: 1px solid #2c2e31; padding-left: 20px;
        }
        .reply-card { margin-bottom: 20px; }
        .reply-card .post-content { font-size: 1rem; }
        .view-more { color: #e2b714; font-size: 0.7rem; cursor: pointer; margin-top: 5px; }

        /* --- NAME OVERLAY --- */ 
        #name-overlay {
            position: fixed; inset: 0; background: #323437; display: none;
            justify-content: center; align-items: center; z-index: 100;
        }
        #name-input {
            background: transparent; border: none; border-bottom: 2px solid #e2b714;
            color: #d1d0c5; font-size: 2.5rem; text-align: center; outline: none; font-family: 'Roboto Mono';
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="compose">
            <div id="compose-name" onclick="handleNameClick()">loading...</div>
            <textarea id="compose-ta" placeholder="type your goal..."></textarea>
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <span id="reply-label" style="font-size: 0.7rem; color: #e2b714; display:none;"></span>
                <button id="post-btn">press enter to post</button>
            </div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="name-overlay">
        <input type="text" id="name-input" placeholder="display name" maxlength="20">
    </div>

    <script>
        const sbUrl = "sburl";
        const sbKey = "sbkey";
        const NAME_KEY = 'mtg_display_name';
        const DATE_KEY = 'mtg_name_updated_at';

        let myName = localStorage.getItem(NAME_KEY) || '';
        let replyingTo = null;

        const feed = document.getElementById('feed');
        const composeName = document.getElementById('compose-name');
        const composeTa = document.getElementById('compose-ta');
        const nameOverlay = document.getElementById('name-overlay');
        const nameInput = document.getElementById('name-input');

        function sbHeaders() {
            return { "apikey": sbKey, "Authorization": `Bearer ${sbKey}`, "Content-Type": "application/json" };
        }

        // --- Name Lock (30 Days) ---
        function handleNameClick() {
            if (replyingTo) { cancelReply(); return; }
            const lastUpdate = localStorage.getItem(DATE_KEY);
            if (lastUpdate) {
                const days = (Date.now() - parseInt(lastUpdate)) / (1000 * 60 * 60 * 24);
                if (days < 30) {
                    alert(`Locked. Changeable in ${Math.ceil(30 - days)} days.`);
                    return;
                }
            }
            nameOverlay.style.display = 'flex';
            nameInput.focus();
        }

        nameInput.onkeydown = (e) => {
            if (e.key === 'Enter') {
                const val = nameInput.value.trim();
                if (val) {
                    localStorage.setItem(NAME_KEY, val);
                    localStorage.setItem(DATE_KEY, Date.now().toString());
                    myName = val;
                    composeName.textContent = myName;
                    nameOverlay.style.display = 'none';
                }
            }
        };

        // --- Posting Logic ---
        function startReply(id, name) {
            replyingTo = id;
            document.getElementById('reply-label').textContent = `replying to ${name}`;
            document.getElementById('reply-label').style.display = 'block';
            composeName.textContent = "cancel";
            composeTa.focus();
        }

        function cancelReply() {
            replyingTo = null;
            document.getElementById('reply-label').style.display = 'none';
            composeName.textContent = myName;
        }

        async function sendPost() {
            const text = composeTa.value.trim();
            if (!text || !myName) return;
            try {
                await fetch(`${sbUrl}/rest/v1/posts`, {
                    method: 'POST',
                    headers: sbHeaders(),
                    body: JSON.stringify({ display_name: myName, content: text, parent_id: replyingTo })
                });
                location.reload();
            } catch(e) { alert('error'); }
        }

        composeTa.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPost(); } };
        document.getElementById('post-btn').onclick = sendPost;

        // --- Rendering Logic ---
        async function loadFeed() {
            const res = await fetch(`${sbUrl}/rest/v1/posts?select=*&order=created_at.desc`, { headers: sbHeaders() });
            const all = await res.json();
            const main = all.filter(p => !p.parent_id);
            const replies = all.filter(p => p.parent_id);

            feed.innerHTML = '';
            main.forEach(post => {
                const postReplies = replies.filter(r => r.parent_id === post.id).reverse();
                feed.appendChild(createMarkup(post, postReplies));
            });
        }

        function createMarkup(post, postReplies) {
            const div = document.createElement('div');
            div.className = 'post-card';
            
            const sliced = postReplies.slice(0, 5);
            const hidden = postReplies.slice(5);

            div.innerHTML = `
                <div class="post-header">
                    <div class="post-name">${post.display_name}</div>
                    <svg class="reply-icon" onclick="startReply(${post.id}, '${post.display_name}')" viewBox="0 0 24 24"><path d="M20,3H4A2,2,0,0,0,2,5V22l5.36-5H20a2,2,0,0,0,2-2V5A2,2,0,0,0,20,3Z"></path></svg>
                </div>
                <div class="post-content">${post.content}</div>
                <div class="post-time">${new Date(post.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                
                <div class="replies-container">
                    ${sliced.map(r => `<div class="reply-card"><div class="post-name">${r.display_name}</div><div class="post-content">${r.content}</div></div>`).join('')}
                    <div id="more-${post.id}" style="display:none;">
                        ${hidden.map(r => `<div class="reply-card"><div class="post-name">${r.display_name}</div><div class="post-content">${r.content}</div></div>`).join('')}
                    </div>
                    ${hidden.length > 0 ? `<div class="view-more" onclick="this.style.display='none'; document.getElementById('more-${post.id}').style.display='block'">+ view ${hidden.length} more</div>` : ''}
                </div>
            `;
            return div;
        }

        if (!myName) nameOverlay.style.display = 'flex';
        else composeName.textContent = myName;
        loadFeed();
    </script>
</body>
</html>
