<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mtgoals // feed</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #323437;
            --main-color: #e2b714;
            --sub-color: #646669;
            --sub-alt-color: #2c2e31;
            --text-color: #d1d0c5;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #container { width: 100%; max-width: 600px; }

        /* Compose Area (Original Design) */
        #compose {
            margin-bottom: 40px;
            border-bottom: 2px solid var(--sub-alt-color);
            padding-bottom: 20px;
        }

        #compose-name { color: var(--main-color); margin-bottom: 10px; cursor: pointer; display: inline-block; font-size: 0.9rem;}

        textarea {
            width: 100%; background: transparent; border: none; color: var(--text-color);
            font-family: 'Roboto Mono'; font-size: 1.2rem; resize: none; outline: none; height: 50px;
        }

        #post-btn {
            background: transparent; border: none; color: var(--sub-color);
            cursor: pointer; font-family: 'Roboto Mono'; transition: 0.2s; padding: 0;
        }
        #post-btn:hover { color: var(--text-color); }

        /* Post Cards */
        .post-card {
            margin-bottom: 25px;
            animation: fadeIn 0.3s ease;
        }

        .post-header { display: flex; justify-content: space-between; align-items: center; }
        .post-name { color: var(--main-color); font-size: 0.9rem; }
        .post-content { margin: 8px 0; font-size: 1.1rem; line-height: 1.4; }
        .post-footer { display: flex; gap: 15px; align-items: center; }
        .post-time { color: var(--sub-color); font-size: 0.7rem; }

        /* Reply Button SVG */
        .reply-icon {
            width: 16px; height: 16px; fill: var(--sub-color); cursor: pointer; transition: 0.2s;
        }
        .reply-icon:hover { fill: var(--main-color); }

        /* Replies Container */
        .replies-container {
            margin-left: 30px;
            margin-top: 10px;
            border-left: 2px solid var(--sub-alt-color);
            padding-left: 15px;
        }

        .reply-card { margin-bottom: 15px; font-size: 0.9rem; }
        .reply-card .post-content { font-size: 0.95rem; }

        .view-more {
            color: var(--main-color);
            font-size: 0.75rem;
            cursor: pointer;
            margin-top: 5px;
            display: inline-block;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Name Overlay */
        #name-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display: none;
            justify-content: center; align-items: center; z-index: 100;
        }
        .name-box input { 
            background: transparent; border: none; border-bottom: 2px solid var(--main-color);
            color: var(--text-color); font-size: 2rem; text-align: center; outline: none; font-family: 'Roboto Mono';
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="compose">
            <div id="compose-name" onclick="promptName()">loading...</div>
            <textarea id="compose-ta" placeholder="type your goal..."></textarea>
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <span id="reply-label" style="font-size: 0.7rem; color: var(--main-color); display:none;"></span>
                <button id="post-btn">press enter to post</button>
            </div>
        </div>
        <div id="feed"></div>
    </div>

    <div id="name-overlay">
        <div class="name-box">
            <input type="text" id="name-input" placeholder="display name" maxlength="20">
        </div>
    </div>

    <script>
        const sbUrl = "sburl";
        const sbKey = "sbkey";
        const NAME_KEY = 'mtg_display_name';
        let myName = localStorage.getItem(NAME_KEY) || '';
        let replyingTo = null;

        const feed = document.getElementById('feed');
        const composeName = document.getElementById('compose-name');
        const composeTa = document.getElementById('compose-ta');
        const postBtn = document.getElementById('post-btn');

        function sbHeaders() {
            return { "apikey": sbKey, "Authorization": `Bearer ${sbKey}`, "Content-Type": "application/json" };
        }

        // Init Name
        if(!myName) document.getElementById('name-overlay').style.display='flex';
        else composeName.textContent = myName;

        document.getElementById('name-input').onkeydown = (e) => {
            if(e.key === 'Enter') {
                const val = e.target.value.trim();
                if(val) {
                    localStorage.setItem(NAME_KEY, val);
                    myName = val;
                    composeName.textContent = myName;
                    document.getElementById('name-overlay').style.display='none';
                }
            }
        };

        function promptName() {
            if(replyingTo) { 
                replyingTo = null; 
                document.getElementById('reply-label').style.display='none';
                composeName.textContent = myName;
                composeTa.placeholder = "type your goal...";
                return;
            }
            document.getElementById('name-overlay').style.display='flex';
        }

        function startReply(id, name) {
            replyingTo = id;
            document.getElementById('reply-label').textContent = `replying to ${name}`;
            document.getElementById('reply-label').style.display = 'block';
            composeName.textContent = "cancel";
            composeTa.focus();
        }

        async function sendPost() {
            const text = composeTa.value.trim();
            if(!text || !myName) return;
            try {
                await fetch(`${sbUrl}/rest/v1/posts`, {
                    method: 'POST',
                    headers: sbHeaders(),
                    body: JSON.stringify({ display_name: myName, content: text, parent_id: replyingTo })
                });
                location.reload();
            } catch(e) { alert('error'); }
        }

        composeTa.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendPost(); } };
        postBtn.onclick = sendPost;

        async function loadFeed() {
            const res = await fetch(`${sbUrl}/rest/v1/posts?select=*&order=created_at.desc`, { headers: sbHeaders() });
            const allPosts = await res.json();
            
            const mainPosts = allPosts.filter(p => !p.parent_id);
            const replies = allPosts.filter(p => p.parent_id);

            feed.innerHTML = '';
            mainPosts.forEach(post => {
                const postReplies = replies.filter(r => r.parent_id === post.id).reverse();
                const postEl = createPostMarkup(post, postReplies);
                feed.appendChild(postEl);
            });
        }

        function createPostMarkup(post, postReplies) {
            const div = document.createElement('div');
            div.className = 'post-card';
            
            let repliesHtml = '';
            postReplies.slice(0, 5).forEach(r => {
                repliesHtml += `
                    <div class="reply-card">
                        <div class="post-name">${r.display_name}</div>
                        <div class="post-content">${r.content}</div>
                    </div>`;
            });

            const moreCount = postReplies.length - 5;
            const viewMore = moreCount > 0 ? `<div class="view-more" onclick="showAllReplies(this)">+ view ${moreCount} more replies</div>` : '';

            div.innerHTML = `
                <div class="post-header">
                    <div class="post-name">${post.display_name}</div>
                    <svg class="reply-icon" onclick="startReply(${post.id}, '${post.display_name}')" viewBox="0 0 24 24"><path d="M20,3H4A2,2,0,0,0,2,5V22l5.36-5H20a2,2,0,0,0,2-2V5A2,2,0,0,0,20,3Z"></path></svg>
                </div>
                <div class="post-content">${post.content}</div>
                <div class="post-time">${new Date(post.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                <div class="replies-container" id="replies-${post.id}">
                    ${repliesHtml}
                    <div class="hidden-replies" style="display:none;">
                        ${postReplies.slice(5).map(r => `<div class="reply-card"><div class="post-name">${r.display_name}</div><div class="post-content">${r.content}</div></div>`).join('')}
                    </div>
                    ${viewMore}
                </div>
            `;
            return div;
        }

        function showAllReplies(btn) {
            const container = btn.parentElement.querySelector('.hidden-replies');
            container.style.display = 'block';
            btn.style.display = 'none';
        }

        loadFeed();
    </script>
</body>
</html>
