  <style id="default-style">
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #313338;
      font-family: 'Roboto Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header .logo {
      height: 70px;
      width: auto;
      margin-bottom: 10px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    header p {
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      font-weight: 300;
    }

    header a.mt-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      font-weight: 300;
      text-decoration: none;
      transition: color 0.2s;
      margin-top: 6px;
    }
    header a.mt-link:hover {
      color: rgba(255,255,255,0.8);
    }
    header a.mt-link svg {
      width: 11px;
      height: 11px;
      flex-shrink: 0;
    }

    .container {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .add-btn {
      background-color: #2b2d31;
      border: none;
      border-radius: 8px;
      color: rgba(255,255,255,0.45);
      font-family: 'Roboto Mono', monospace;
      font-size: 0.88rem;
      padding: 14px 20px;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      width: 100%;
    }
    .add-btn:hover {
      background-color: #35373d;
      color: rgba(255,255,255,0.7);
    }

    .goal-input-row {
      display: flex;
      align-items: center;
      background-color: #2b2d31;
      border-radius: 8px;
      padding: 10px 14px;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }

    .goal-input-row textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.88rem;
      resize: none;
      height: 42px;
      line-height: 1.5;
      padding-top: 4px;
    }
    .goal-input-row textarea::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .char-counter {
      color: rgba(255,255,255,0.5);
      font-size: 0.72rem;
      white-space: nowrap;
    }

    .pin-btn, .cancel-btn {
      background: none;
      border: none;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .pin-btn {
      color: #e2b714;
    }
    .pin-btn:hover { background: rgba(226,183,20,0.12); }

    .cancel-btn {
      color: rgba(255,255,255,0.45);
    }
    .cancel-btn:hover { background: rgba(255,255,255,0.07); }

    .goal-card {
      display: flex;
      align-items: flex-start;
      background-color: #2b2d31;
      border-radius: 8px;
      padding: 14px 16px;
      gap: 14px;
      animation: fadeIn 0.2s ease;
      position: relative;
      transition: box-shadow 0.15s, background 0.15s;
      user-select: none;
    }

    .goal-card.dragging {
      opacity: 0.45;
      box-shadow: none;
    }

    .goal-card.drag-over {
      box-shadow: 0 0 0 2px #e2b714;
    }

    .goal-card .goal-text {
      flex: 1;
      color: #fff;
      font-size: 0.88rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .goal-card-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      flex-shrink: 0;
      opacity: 0.55;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
    }
    .delete-btn:hover { opacity: 1; }
    .delete-btn svg { width: 18px; height: 18px; display: block; }

    .drag-handle {
      background: none;
      border: none;
      cursor: grab;
      padding: 2px 4px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      opacity: 0.35;
      transition: opacity 0.15s;
      touch-action: none;
      height: 100%;
      align-self: center;
    }
    .drag-handle:hover { opacity: 0.9; }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle span {
      display: block;
      width: 3.5px;
      height: 3.5px;
      border-radius: 50%;
      background: #fff;
    }

    .drop-indicator {
      height: 2px;
      background: #e2b714;
      border-radius: 2px;
      margin: -6px 0;
      animation: fadeIn 0.1s ease;
    }

    .fading {
      animation: fadeOut 0.35s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.97); }
    }

    .footer {
      position: fixed;
      bottom: 28px;
      left: 28px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .footer-right {
      position: fixed;
      bottom: 28px;
      right: 28px;

      gap: 4px;
    }

    .footer-link {
      display: inline-flex;

      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      font-family: 'Roboto Mono', monospace;
      font-size: 0.78rem;
      font-weight: 300;
      text-decoration: none;
      padding: 6px 8px;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .footer-link:hover {
      color: rgba(255,255,255,1);
    }
    .footer-link svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      opacity: inherit;
    }

    .footer-divider {
      color: rgba(255,255,255,0.2);
      font-size: 0.78rem;
      user-select: none;
    }

    .theme-toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      font-family: 'Roboto Mono', monospace;
      font-size: 0.78rem;
      font-weight: 300;
      padding: 6px 8px;
      border-radius: 4px;
      transition: color 0.2s;
    }
    .theme-toggle-btn:hover {
      color: rgba(255,255,255,1);
    }
    .theme-toggle-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
  </style>
</head>

<script>
const STORAGE_KEY = 'monkeytype_goals';
const THEME_KEY   = 'monkeytype_goals_theme';
const container   = document.getElementById('goalsContainer');
const addBtn      = document.getElementById('addBtn');
const MAX         = 180;

const themeBtn        = document.getElementById('themeToggleBtn');
const themeLabel      = document.getElementById('themeLabel');
const themeStylesheet = document.getElementById('theme-stylesheet');
const defaultStyle    = document.getElementById('default-style');
const headerLogo      = document.getElementById('header-logo');

let isDiscord = localStorage.getItem(THEME_KEY) === 'discord';

function applyTheme(discord) {
  let favicon = document.querySelector("link[rel~='icon']");
  if (!favicon) {
    favicon = document.createElement('link');
    favicon.rel = 'icon';
    document.head.appendChild(favicon);
  }
  if (discord) {
    themeStylesheet.href = '/themes/discord.css';
    defaultStyle.disabled = true;
    themeLabel.textContent = 'Discord';
    headerLogo.src = '/images/mtgoals_discord.png';
    favicon.href = '/images/mtg_discord.png';
  } else {
    themeStylesheet.href = '';
    defaultStyle.disabled = false;
    themeLabel.textContent = 'Default';
    headerLogo.src = '/images/mtgoals.png';
    favicon.href = '/images/mtg.png';
  }
}

applyTheme(isDiscord);

themeBtn.addEventListener('click', () => {
  isDiscord = !isDiscord;
  localStorage.setItem(THEME_KEY, isDiscord ? 'discord' : 'default');
  const overlay = document.createElement('div');
  Object.assign(overlay.style, {
    position: 'fixed',
    top: '0',
    left: '0',
    width: '100vw',
    height: '100vh',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center',
    backgroundColor: '#313338',
    zIndex: '999999',
    opacity: '1',
    transition: 'opacity 0.8s ease-out',
  });
  const text = document.createElement('span');
  text.textContent = 'Loading Data...';
  Object.assign(text.style, {
    fontFamily: "'Roboto Mono', monospace",
    fontSize: '1.4rem',
    fontWeight: '500',
    color: isDiscord ? '#5974ea' : '#e2b714',
  });
  overlay.appendChild(text);
  document.body.appendChild(overlay);
  applyTheme(isDiscord);
  setTimeout(() => {
    overlay.style.opacity = '0';
    overlay.addEventListener('transitionend', () => overlay.remove());
  }, 500);
});

function loadGoals() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveGoals(goals) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(goals));
}

let dragSrc = null;
let dragId  = null;
let indicator = null;

function getCards() {
  return [...container.querySelectorAll('.goal-card')];
}

function removeIndicator() {
  if (indicator) { indicator.remove(); indicator = null; }
}

function insertIndicatorBefore(el) {
  removeIndicator();
  indicator = document.createElement('div');
  indicator.className = 'drop-indicator';
  container.insertBefore(indicator, el);
}

function insertIndicatorAfter(el) {
  removeIndicator();
  indicator = document.createElement('div');
  indicator.className = 'drop-indicator';
  el.after(indicator);
}

function onHandleMouseDown(e, card, id) {
  e.preventDefault();
  dragSrc = card;
  dragId  = id;
  card.classList.add('dragging');

  function onMouseMove(ev) {
    const cards = getCards().filter(c => c !== dragSrc);
    removeIndicator();

    let placed = false;
    for (const c of cards) {
      const rect = c.getBoundingClientRect();
      const mid  = rect.top + rect.height / 2;
      if (ev.clientY < mid) {
        insertIndicatorBefore(c);
        placed = true;
        break;
      }
    }
    if (!placed && cards.length > 0) {
      insertIndicatorAfter(cards[cards.length - 1]);
    }
  }

  function onMouseUp() {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    finishDrag();
  }

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function onHandleTouchStart(e, card, id) {
  dragSrc = card;
  dragId  = id;
  card.classList.add('dragging');

  function onTouchMove(ev) {
    ev.preventDefault();
    const touch = ev.touches[0];
    const cards = getCards().filter(c => c !== dragSrc);
    removeIndicator();

    let placed = false;
    for (const c of cards) {
      const rect = c.getBoundingClientRect();
      const mid  = rect.top + rect.height / 2;
      if (touch.clientY < mid) {
        insertIndicatorBefore(c);
        placed = true;
        break;
      }
    }
    if (!placed && cards.length > 0) {
      insertIndicatorAfter(cards[cards.length - 1]);
    }
  }

  function onTouchEnd() {
    card.removeEventListener('touchmove', onTouchMove);
    card.removeEventListener('touchend', onTouchEnd);
    finishDrag();
  }

  card.addEventListener('touchmove', onTouchMove, { passive: false });
  card.addEventListener('touchend', onTouchEnd);
}

function finishDrag() {
  if (!dragSrc) return;
  dragSrc.classList.remove('dragging');

  if (indicator) {
    container.insertBefore(dragSrc, indicator);
    removeIndicator();
  }

  dragSrc = null;
  dragId  = null;

  const newOrder = getCards().map(c => c.dataset.id);
  const goals = loadGoals();
  const map = Object.fromEntries(goals.map(g => [g.id, g]));
  const reordered = newOrder.map(id => map[id]).filter(Boolean);
  saveGoals(reordered);
}

function renderGoal(text, id) {
  const card = document.createElement('div');
  card.className = 'goal-card';
  card.dataset.id = id;

  const textEl = document.createElement('span');
  textEl.className = 'goal-text';
  textEl.textContent = text;

  const actions = document.createElement('div');
  actions.className = 'goal-card-actions';

  const delBtn = document.createElement('button');
  delBtn.className = 'delete-btn';
  delBtn.title = 'Remove goal';
  delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path fill-rule="evenodd" clip-rule="evenodd"
      d="M21.5821 5.54289C21.9726 5.93342 21.9726 6.56658 21.5821 6.95711L10.2526 18.2867C9.86452 18.6747 9.23627 18.6775 8.84475 18.293L2.29929 11.8644C1.90527 11.4774 1.89956 10.8443 2.28655 10.4503C2.67354 10.0562 3.30668 10.0505 3.70071 10.4375L9.53911 16.1717L20.1679 5.54289C20.5584 5.15237 21.1916 5.15237 21.5821 5.54289Z"
      fill="#ffffff"/>
  </svg>`;

delBtn.addEventListener('click', () => {
  launchConfetti();
  card.classList.add('fading');
    card.addEventListener('animationend', () => {
      card.remove();
      const goals = loadGoals().filter(g => g.id !== id);
      saveGoals(goals);
    });
  });

  const handle = document.createElement('button');
  handle.className = 'drag-handle';
  handle.title = 'Drag to reorder';
  handle.innerHTML = `<span></span><span></span><span></span>`;

  handle.addEventListener('mousedown', e => onHandleMouseDown(e, card, id));
  handle.addEventListener('touchstart', e => onHandleTouchStart(e, card, id), { passive: true });

  actions.appendChild(delBtn);

  card.appendChild(handle);
  card.appendChild(textEl);
  card.appendChild(actions);

  container.appendChild(card);
}

function showInputRow() {
  addBtn.style.display = 'none';

  const row = document.createElement('div');
  row.className = 'goal-input-row';

  const ta = document.createElement('textarea');
  ta.placeholder = 'Type your goal here...';
  ta.maxLength = MAX;

  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
    counter.textContent = `${ta.value.length}/${MAX}`;
  });

  const actionsEl = document.createElement('div');
  actionsEl.className = 'input-actions';

  const pinBtn = document.createElement('button');
  pinBtn.className = 'pin-btn';
  pinBtn.textContent = 'Pin';

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'cancel-btn';
  cancelBtn.textContent = 'Cancel';

  const counter = document.createElement('span');
  counter.className = 'char-counter';
  counter.textContent = `0/${MAX}`;

  function pinGoal() {
    const text = ta.value.trim();
    if (!text) {
      row.remove();
      addBtn.style.display = '';
      return;
    }
    const id = Date.now().toString();
    const goals = loadGoals();
    goals.push({ id, text });
    saveGoals(goals);
    row.remove();
    addBtn.style.display = '';
    renderGoal(text, id);
  }

  function cancelGoal() {
    row.remove();
    addBtn.style.display = '';
  }

  pinBtn.addEventListener('click', pinGoal);
  cancelBtn.addEventListener('click', cancelGoal);
  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); pinGoal(); }
    if (e.key === 'Escape') { cancelGoal(); }
  });

  actionsEl.appendChild(pinBtn);
  actionsEl.appendChild(cancelBtn);
  actionsEl.appendChild(counter);
  row.appendChild(ta);
  row.appendChild(actionsEl);

  container.insertBefore(row, container.firstChild);
  ta.focus();
}

addBtn.addEventListener('click', showInputRow);
loadGoals().forEach(g => renderGoal(g.text, g.id));

function launchConfetti() {
  confetti({
    particleCount: 120,
    spread: 80,
    origin: { y: 0.6 },
    colors: ['#e2b714', '#0096FF', '#FF69B4']
  });
}
</script>
