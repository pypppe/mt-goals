<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monkeytype Goals</title>
  <link rel="icon" type="image/png" href="/images/mtg.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #313338;
      font-family: 'Roboto Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
    }

    .middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
    }

    .error-code {
      color: #e2b714;
      font-size: 6rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .error-msg {
      color: rgba(255,255,255,0.5);
      font-size: 0.92rem;
      font-weight: 300;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: #2c2e31;
      border: none;
      border-radius: 6px;
      padding: 9px 16px;
      color: rgba(255,255,255,0.75);
      font-family: 'Roboto Mono', monospace;
      font-size: 0.82rem;
      cursor: pointer;
      text-decoration: none;
      margin-top: 4px;
      transition: background 0.2s, color 0.2s;
    }
    .home-btn:hover {
      background-color: #35373d;
      color: #fff;
    }
    .home-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header .logo {
      height: 70px;
      width: auto;
      margin-bottom: 10px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    header p {
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      font-weight: 300;
    }

    header a.mt-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      font-weight: 300;
      text-decoration: none;
      transition: color 0.2s;
      margin-top: 6px;
    }
    header a.mt-link:hover {
      color: rgba(255,255,255,0.8);
    }
    header a.mt-link svg {
      width: 11px;
      height: 11px;
      flex-shrink: 0;
    }

    .container {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .add-btn {
      background-color: #2b2d31;
      border: none;
      border-radius: 8px;
      color: rgba(255,255,255,0.45);
      font-family: 'Roboto Mono', monospace;
      font-size: 0.88rem;
      padding: 14px 20px;
      text-align: left;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      width: 100%;
    }
    .add-btn:hover {
      background-color: #35373d;
      color: rgba(255,255,255,0.7);
    }

    .goal-input-row {
      display: flex;
      align-items: center;
      background-color: #2b2d31;
      border-radius: 8px;
      padding: 10px 14px;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }

    .goal-input-row textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.88rem;
      resize: none;
      height: 42px;
      line-height: 1.5;
      padding-top: 4px;
    }
    .goal-input-row textarea::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .char-counter {
      color: rgba(255,255,255,0.5);
      font-size: 0.72rem;
      white-space: nowrap;
    }

    .pin-btn, .cancel-btn {
      background: none;
      border: none;
      font-family: 'Roboto Mono', monospace;
      font-size: 0.82rem;
      cursor: pointer;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .pin-btn {
      color: #e2b714;
    }
    .pin-btn:hover { background: rgba(226,183,20,0.12); }

    .cancel-btn {
      color: rgba(255,255,255,0.45);
    }
    .cancel-btn:hover { background: rgba(255,255,255,0.07); }

    .goal-card {
      display: flex;
      align-items: flex-start;
      background-color: #2b2d31;
      border-radius: 8px;
      padding: 14px 16px;
      gap: 14px;
      animation: fadeIn 0.2s ease;
    }

    .goal-card .goal-text {
      flex: 1;
      color: #fff;
      font-size: 0.88rem;
      line-height: 1.6;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      flex-shrink: 0;
      opacity: 0.55;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
    }
    .delete-btn:hover { opacity: 1; }
    .delete-btn svg { width: 18px; height: 18px; display: block; }

    .fading {
      animation: fadeOut 0.35s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.97); }
    }
  </style>
</head>
<body>

<header>
  <img src="/images/mtgoals.png" alt="Monkeytype Goals" class="logo" />
  <p>Not promoted or endorsed by Miodec.</p>
  <a class="mt-link" href="https://monkeytype.com" target="_blank" rel="noopener noreferrer">
    monkeytype.com
    <svg viewBox="0 0 512 512" version="1.1" xmlns="http://www.w3.org/2000/svg" fill="none">
      <g fill="rgba(255,255,255,0.5)" transform="translate(85.333333, 64.000000)">
        <path d="M128,63.999444 L128,106.666444 L42.6666667,106.666667 L42.6666667,320 L256,320 L256,234.666444 L298.666,234.666444 L298.666667,362.666667 L4.26325641e-14,362.666667 L4.26325641e-14,64 L128,63.999444 Z M362.666667,1.42108547e-14 L362.666667,170.666667 L320,170.666667 L320,72.835 L143.084945,249.751611 L112.915055,219.581722 L289.83,42.666 L192,42.6666667 L192,1.42108547e-14 L362.666667,1.42108547e-14 Z"/>
      </g>
    </svg>
  </a>
</header>

<div class="middle">
  <div class="error-code">404</div>
  <div class="error-msg">Page was not found.</div>
  <a href="/" class="home-btn">
    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path fill-rule="evenodd" clip-rule="evenodd" d="M8 0L0 6V8H1V15H4V10H7V15H15V8H16V6L14 4.5V1H11V2.25L8 0ZM9 10H12V13H9V10Z" fill="#ffffff"></path>
    </svg>
    Go Home
  </a>
</div>

</body>
</html>
