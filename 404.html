<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — MonkeyType Goals</title>
  <link rel="icon" type="image/png" href="/images/fav.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #313338;
      font-family: 'Roboto Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      padding-top: 60px;
      margin-bottom: 0;
    }

    header h1 {
      color: #e2b714;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      margin-bottom: 10px;
    }

    header p {
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem;
      font-weight: 300;
    }

    .middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
    }

    .error-code {
      color: #e2b714;
      font-size: 6rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .error-msg {
      color: rgba(255,255,255,0.5);
      font-size: 0.92rem;
      font-weight: 300;
    }
  </style>
</head>
<body>

  <header>
    <h1>MonkeyType Goals</h1>
    <p>Not promoted or endorsed by Miodec.</p>
  </header>

  <div class="middle">
    <div class="error-code">404</div>
    <div class="error-msg">Page was not found.</div>
  </div>

</body>
</html>
